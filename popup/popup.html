<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crunchyroll Auto Skipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../icons/icon.svg" alt="Panda Icon" class="logo">
      <h1>Crunchy Skipper</h1>
    </div>

    <div class="option-group">
      <div class="option-item">
        <label class="switch">
          <input type="checkbox" id="skipRecap">
          <span class="slider round"></span>
        </label>
        <label for="skipRecap" class="item-label">Skip Recap</label>
        <div class="timer-input">
          <input type="number" id="recapTimer" min="0" value="0">
          <span>s delay</span>
        </div>
      </div>

      <div class="option-item">
        <label class="switch">
          <input type="checkbox" id="skipIntro">
          <span class="slider round"></span>
        </label>
        <label for="skipIntro" class="item-label">Skip Intro</label>
        <div class="timer-input">
          <input type="number" id="introTimer" min="0" value="0">
          <span>s delay</span>
        </div>
      </div>

      <div class="option-item">
        <label class="switch">
          <input type="checkbox" id="skipCredits">
          <span class="slider round"></span>
        </label>
        <label for="skipCredits" class="item-label">Skip Credits</label>
        <div class="timer-input">
          <input type="number" id="creditsTimer" min="0" value="0">
          <span>s delay</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="status" id="status">AutoSave On</div>
        <div class="footer-info">
          <a href="https://github.com/sudhir-asuracore/crunchyroll-auto-skipper" target="_blank" class="github-link" title="View on GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="github-icon"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-3-7-3"/></svg>
          </a>
          <span id="version" class="version-text">v0.0.1</span>
        </div>
      </div>
      <a href="https://ko-fi.com/U7U61FUIAB" target="_blank" class="kofi-link">
        <img src="https://storage.ko-fi.com/cdn/kofi6.png?v=6" alt="Buy Me a Coffee at ko-fi.com">
      </a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
